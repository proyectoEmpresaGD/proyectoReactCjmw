name: CI Pipeline

on:
  pull_request:
    branches: [main]

  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: main
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      - name: Generate AI release notes
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          echo "Detecting previous tag..."

          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | grep -v "^${RELEASE_TAG}$" | head -n 1)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found"
            COMMITS=$(git log -20 --pretty=format:"- %s")
            DIFF=$(git diff --unified=0 HEAD~20 HEAD | head -c 12000)
          else
            echo "Previous tag: $PREV_TAG"
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s")
            DIFF=$(git diff --unified=0 "${PREV_TAG}..HEAD" | head -c 12000)
          fi

          echo "Commits detected:"
          echo "$COMMITS"

          PROMPT=$(cat <<EOF
Actúa como un Release Engineer senior experto en CI/CD, versionado semántico, GitHub Releases y comunicación técnica de cambios para entornos de producción.

Tu tarea es generar unas release notes profesionales basadas en:
1. los commits incluidos
2. el diff real del código

Contexto:
- Proyecto web en producción
- Stack: React, Vite, Node, Vercel
- Entorno real de producción

Instrucciones:
- Escribe en español
- No listes archivos salvo que sea imprescindible
- No repitas commits literalmente
- No describas cambios superficiales como "se movieron archivos" si no afectan comportamiento
- Prioriza la lógica funcional real detectada en el diff
- Explica qué comportamiento cambió, qué flujo se añadió o corrigió y qué impacto tiene
- Si detectas tests nuevos o refuerzo de validaciones, menciónalo como mejora de calidad
- Si no hay cambios funcionales, indícalo claramente y explica que son cambios internos o de estructura
- No inventes cambios que no estén soportados por los datos
- Si no hay información suficiente para una sección, omítela

Estructura obligatoria:

Resumen
Breve explicación de la finalidad de la release.

Cambios principales
Lista clara de funcionalidades o cambios relevantes de comportamiento.

Correcciones
Errores solucionados o ajustes de comportamiento, si aplica.

Mejoras técnicas
Cambios internos que mejoran calidad, estabilidad o mantenibilidad, si aplica.

Impacto
Cómo afecta esta release a usuarios, estabilidad o mantenimiento.

Tag de release:
$RELEASE_TAG

Commits analizados:
$COMMITS

Diff analizado:
$DIFF
EOF
)

          jq -n \
            --arg model "gpt-4.1-mini" \
            --arg input "$PROMPT" \
            '{model: $model, input: $input}' > request.json

          echo "Calling OpenAI API..."

          curl https://api.openai.com/v1/responses \
            -s \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d @request.json > response.json

          API_ERROR=$(jq -r '.error.message // empty' response.json)

          if [ -n "$API_ERROR" ]; then
            echo "OpenAI API error: $API_ERROR"
            NOTES=""
          else
            NOTES=$(jq -r '
              .output_text //
              ([.output[]?.content[]? | select(.type == "output_text") | .text] | join("\n")) //
              empty
            ' response.json)
          fi

          if [ -z "$NOTES" ]; then
            echo "AI generation failed, using fallback notes"
            NOTES="Release $RELEASE_TAG

Cambios incluidos en esta versión:
$COMMITS"
          fi

          printf "%s\n" "$NOTES" > release_notes.md

      - name: Update GitHub Release body
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          gh release edit "$RELEASE_TAG" --notes-file release_notes.md